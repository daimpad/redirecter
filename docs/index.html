<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecter</title>
    <meta name="description" content="Weiterleitungen erstellen.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@700&family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap">
    <style>
        :root {
            --nz-paper:  #FFFEE5;
            --nz-ink:    #000000;
            --nz-border: 2px solid #000;
            --nz-f-disp: 'Zilla Slab', Georgia, serif;
            --nz-f-mono: 'Space Mono', 'Courier New', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--nz-f-mono);
            background: var(--nz-paper);
            color: var(--nz-ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-family: var(--nz-f-disp);
            font-size: clamp(4rem, 14vw, 9rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .sub {
            font-family: var(--nz-f-mono);
            font-size: clamp(.8rem, 2vw, 1rem);
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-top: 1.25rem;
            opacity: .6;
        }

        footer {
            padding: 1.5rem;
            border-top: var(--nz-border);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        footer a {
            color: var(--nz-ink);
            display: inline-flex;
            opacity: .55;
            transition: opacity .1s;
        }

        footer a:hover { opacity: 1; }

        footer svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

<main>
    <h1>Redirecter</h1>
    <p class="sub">Weiterleitungen erstellen</p>
</main>

<footer>
    <a href="https://github.com/daimpad/redirecter" aria-label="GitHub" rel="noopener">

        </svg>
    </a>
</footer>

</body>
</html>
