<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecter</title>
    <meta name="description" content="Weiterleitungen erstellen.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
    <style>
        :root {
            --nz-paper:  #FFFEE5;
            --nz-ink:    #000000;
            --nz-signal: #00FF9C;
            --nz-border: 2px solid #000;
            --nz-shadow: 4px 4px 0 #000;
            --nz-f-disp: 'Zilla Slab', Georgia, serif;
            --nz-f-mono: 'Space Mono', 'Courier New', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: var(--nz-f-mono);
            background: var(--nz-paper);
            color: var(--nz-ink);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 2rem;
        }

        .hero h1 {
            font-family: var(--nz-f-disp);
            font-size: clamp(4rem, 14vw, 9rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .hero .sub {
            font-size: clamp(.8rem, 2vw, 1rem);
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-top: 1.25rem;
            opacity: .6;
        }

        .card {
            width: 100%;
            max-width: 480px;
            border: var(--nz-border);
            box-shadow: var(--nz-shadow);
            padding: 1.5rem;
            text-align: left;
        }

        .field + .field { margin-top: 1rem; }

        label {
            display: block;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: .4rem;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: .6rem .75rem;
            border: var(--nz-border);
            background: var(--nz-paper);
            font-family: var(--nz-f-mono);
            font-size: .9rem;
            outline: none;
            transition: box-shadow .1s;
            border-radius: 0;
            -webkit-appearance: none;
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            box-shadow: var(--nz-shadow);
        }

        .btn {
            display: inline-block;
            margin-top: 1.25rem;
            padding: .65rem 1.5rem;
            border: var(--nz-border);
            background: var(--nz-signal);
            color: var(--nz-ink);
            font-family: var(--nz-f-mono);
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--nz-shadow);
            transition: box-shadow .1s, transform .1s;
            width: 100%;
            border-radius: 0;
        }

        .btn:hover  { box-shadow: 6px 6px 0 #000; }
        .btn:active { box-shadow: 2px 2px 0 #000; transform: translate(2px, 2px); }

        footer {
            padding: 1.5rem;
            border-top: var(--nz-border);
            display: flex;
            justify-content: center;
        }

        footer a {
            color: var(--nz-ink);
            display: inline-flex;
            opacity: .5;
            transition: opacity .1s;
        }

        footer a:hover { opacity: 1; }

        footer svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

<main>
    <div class="hero">
        <h1>Redirecter</h1>
        <p class="sub">Weiterleitungen erstellen</p>
    </div>

    <div class="card">
        <div class="field">
            <label for="url">Ziel-URL</label>
            <input type="url" id="url" placeholder="https://beispiel.de/langer-link">
        </div>
        <div class="field">
            <label for="slug">Wunsch-Slug <span style="opacity:.5;font-weight:400">(optional)</span></label>
            <input type="text" id="slug" placeholder="mein-link">
        </div>
        <button class="btn" type="button">Kurzlink erstellen</button>
    </div>
</main>

<footer>
    <a href="https://github.com/daimpad/redirecter" aria-label="GitHub" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
    </a>
</footer>

</body>
</html>
